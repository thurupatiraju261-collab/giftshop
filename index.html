<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresentPerfect - Gift Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo" onclick="showPage('products-page')">🛍️ PresentPerfect</div>
        <nav>
            <span onclick="showPage('products-page')">Home</span>
            <span onclick="showPage('auth-page')" id="auth-nav-btn">Login/Register</span>
            <div class="cart-icon" onclick="showPage('cart-page')">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <main class="container">
        
        <section id="products-page" class="page active">
            <h2 class="section-title">Our Gift Collection</h2>
            <div class="products-grid" id="products-container">
                </div>

            <div id="product-modal" class="modal">
                <div class="modal-content">
                    <span class="close-btn" onclick="closeModal()">&times;</span>
                    <div class="modal-body" id="modal-product-details">
                        </div>
                </div>
            </div>
        </section>

        <section id="cart-page" class="page">
            <h2 class="section-title">Your Shopping Cart</h2>
            <div class="cart-container">
                <div class="cart-items" id="cart-items-container">
                    </div>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row"><span>Subtotal:</span> <span id="cart-subtotal">$0.00</span></div>
                    <div class="summary-row"><span>Shipping:</span> <span>Free</span></div>
                    <hr>
                    <div class="summary-row total"><span>Total:</span> <span id="cart-total">$0.00</span></div>
                    <button class="btn checkout-btn" onclick="processOrder()">Place Order</button>
                </div>
            </div>
        </section>

        <section id="auth-page" class="page">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button id="login-tab" class="auth-tab active" onclick="switchAuthMode('login')">Login</button>
                    <button id="register-tab" class="auth-tab" onclick="switchAuthMode('register')">Register</button>
                </div>
                
                <form id="login-form" class="auth-form" onsubmit="handleAuth(event, 'login')">
                    <h3>Welcome Back</h3>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required placeholder="enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>

                <form id="register-form" class="auth-form hidden" onsubmit="handleAuth(event, 'register')">
                    <h3>Create Account</h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" required placeholder="Min 6 characters">
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
